<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculatrice Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Calculatrice Pro</h1>
    </header>
    <main>
        <section class="calco" aria-label="Calculatrice">
            <div class="ecran" id="ecran" aria-live="polite">0</div>

            <div class="clavier">
                <button class="bouton bouton-number" type="button" data-value="7">7</button>
                <button class="bouton bouton-number" type="button" data-value="8">8</button>
                <button class="bouton bouton-number" type="button" data-value="9">9</button>
                <button class="bouton bouton-delete" type="button" data-value="DEL">DEL</button>

                <button class="bouton bouton-number" type="button" data-value="4">4</button>
                <button class="bouton bouton-number" type="button" data-value="5">5</button>
                <button class="bouton bouton-number" type="button" data-value="6">6</button>
                <button class="bouton bouton-operator" type="button" data-value="/">/</button>

                <button class="bouton bouton-number" type="button" data-value="1">1</button>
                <button class="bouton bouton-number" type="button" data-value="2">2</button>
                <button class="bouton bouton-number" type="button" data-value="3">3</button>
                <button class="bouton bouton-operator" type="button" data-value="*">*</button>

                <button class="bouton bouton-number" type="button" data-value="0">0</button>
                <button class="bouton bouton-number" type="button" data-value=".">.</button>
                <button class="bouton bouton-operator" type="button" data-value="-">-</button>
                <button class="bouton bouton-operator" type="button" data-value="+">+</button>

                <button class="bouton bouton-clear" type="button" data-value="AC">AC</button>
                <button class="bouton bouton-equal" type="button" data-value="=">=</button>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
